port 7102
bind 127.0.0.1

# 集群配置
cluster-enabled yes
cluster-config-file "node-7102.conf"
cluster-node-timeout 5000

# 持久化配置
appendonly yes
appendfilename "appendonly-7102.aof"
appendfsync everysec
save 3600 1
save 300 100
save 60 10000

# 内存配置
maxmemory 1073741824
maxmemory-policy noeviction
maxmemory-samples 5

# 性能配置
maxclients 1024
rdbcompression yes
rdbchecksum yes
stop-writes-on-bgsave-error yes

# 日志配置
logfile "/Users/tangxiandong/RUST-REDIS/rust-redis/cluster-logs/server-7102.log"
